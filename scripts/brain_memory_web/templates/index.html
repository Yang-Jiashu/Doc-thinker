<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocThinker · Brain-Like Memory</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0a0e1a;--bg-panel:#101626;--border:rgba(255,255,255,0.08);--text:#e8eaf0;--text-dim:#7a8499;--text-faint:#4a5266;--accent:#ff4081;--accent2:#4fc3f7;--success:#00e676;--warning:#ffd740;--episode:#4fc3f7;--entity:#81c784;--analogous:#ce93d8;--same-theme:#81c784;--concept-link:#4fc3f7}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 600px 400px at 20% 30%,rgba(79,195,247,.07),transparent),radial-gradient(ellipse 500px 300px at 80% 70%,rgba(255,64,129,.06),transparent)}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 18px;background:rgba(16,22,38,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:17px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.tagline{font-size:12px;color:var(--text-dim);white-space:nowrap}.spacer{flex:1}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.03);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-seed{border-color:rgba(79,195,247,.3);color:var(--accent2)}
.btn-sleep{border-color:rgba(206,147,216,.3);color:#ce93d8}
.btn-think{border-color:rgba(255,213,79,.3);color:var(--warning)}
.btn-age{border-color:rgba(255,64,129,.3);color:var(--accent)}
.btn .icon{font-size:14px}
.main{display:flex;flex:1;overflow:hidden;gap:1px;background:var(--border)}
.panel{background:var(--bg-panel);display:flex;flex-direction:column;overflow:hidden}
.panel-left{width:260px;flex-shrink:0}.panel-center{flex:1}.panel-right{width:290px;flex-shrink:0}
.panel-header{padding:9px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.panel-header .dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.panel-body{flex:1;overflow-y:auto;padding:10px}
.msg{margin-bottom:10px;padding:9px 11px;border-radius:10px;font-size:12px;line-height:1.5;animation:fadeInUp .3s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-user{background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.15);margin-left:10px}
.msg-user::before{content:'User';display:block;font-size:9px;font-weight:600;color:var(--accent2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.msg-system{background:rgba(255,255,255,.03);border:1px solid var(--border);margin-right:10px}
.msg-system::before{content:'System';display:block;font-size:9px;font-weight:600;color:var(--text-dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.msg-sleep{border-color:rgba(206,147,216,.2)}.msg-sleep::before{color:#ce93d8;content:'Sleep'}
.msg-activation{border-color:rgba(255,213,79,.2)}.msg-activation::before{color:var(--warning);content:'Activation'}
.msg-age{border-color:rgba(255,64,129,.2)}.msg-age::before{color:var(--accent);content:'Aging'}
#graph-svg{width:100%;height:100%;display:block}
.graph-overlay{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.graph-stat{background:rgba(10,14,26,.8);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--text-dim)}
.graph-stat b{color:var(--text)}
.legend{position:absolute;bottom:10px;left:10px;background:rgba(10,14,26,.8);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:10px;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.legend-item{display:flex;align-items:center;gap:6px;color:var(--text-dim)}
.legend-swatch{width:18px;height:3px;border-radius:2px}.legend-swatch.node{width:9px;height:9px;border-radius:50%}
.inspector-section{margin-bottom:14px}
.inspector-section h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:6px}
.node-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:5px;font-size:11px;transition:all .15s}
.node-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}
.node-card .nid{font-weight:600;font-size:12px}
.node-card .ntype{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px}
.ntype.episode{background:rgba(79,195,247,.15);color:var(--episode)}.ntype.entity{background:rgba(129,199,132,.15);color:var(--entity)}
.node-card .nsum{color:var(--text-dim);font-size:10px;margin-top:3px;line-height:1.3}
.weight-bar{display:inline-block;width:50px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;vertical-align:middle;margin-left:4px}
.weight-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.phase-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.phase-idle{background:rgba(255,255,255,.05);color:var(--text-dim)}
.phase-seeded{background:rgba(79,195,247,.15);color:var(--accent2)}
.phase-consolidated{background:rgba(206,147,216,.15);color:#ce93d8}
.phase-queried{background:rgba(255,213,79,.15);color:var(--warning)}
.phase-aged{background:rgba(255,64,129,.15);color:var(--accent)}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(16,22,38,.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:500;z-index:1000;opacity:0;pointer-events:none;transition:all .3s ease}
.toast.show{opacity:1}.toast.success{border-color:rgba(0,230,118,.3);color:var(--success)}
.toast.warning{border-color:rgba(255,213,79,.3);color:var(--warning)}.toast.error{border-color:rgba(255,64,129,.3);color:var(--accent)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.finding-banner{background:linear-gradient(135deg,rgba(255,213,79,.12),rgba(255,64,129,.08));border:1px solid rgba(255,213,40,.25);border-radius:10px;padding:10px;margin-bottom:10px;animation:fadeInUp .4s ease}
.finding-banner .ftitle{font-size:12px;font-weight:600;color:var(--warning);margin-bottom:4px}
.finding-banner .fpath{font-size:11px;font-family:'JetBrains Mono','Fira Code',monospace;color:var(--text);background:rgba(0,0,0,.3);padding:5px 8px;border-radius:6px;margin-top:4px}
.finding-banner .fdesc{font-size:10px;color:var(--text-dim);margin-top:4px}
.compare-box{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.compare-col{padding:8px;border-radius:8px;font-size:10px;line-height:1.4}
.compare-col.chatgpt{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);color:var(--text-dim)}
.compare-col.dt{background:rgba(79,195,247,.05);border:1px solid rgba(79,195,247,.15);color:var(--text)}
.compare-col h5{font-size:10px;font-weight:600;margin-bottom:4px}.compare-col.chatgpt h5{color:var(--text-dim)}.compare-col.dt h5{color:var(--accent2)}
.ep-status{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;margin-bottom:4px;font-size:11px}
.ep-status.STRONG{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.15)}
.ep-status.WEAKENED{background:rgba(255,64,129,.08);border:1px solid rgba(255,64,129,.15)}
.ep-status.STABLE{background:rgba(255,213,79,.08);border:1px solid rgba(255,213,40,.15)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="app">
  <div class="topbar">
    <span class="logo">DocThinker · Brain Memory</span>
    <span class="tagline">Memory is alive, not stored</span>
    <span class="spacer"></span>
    <span id="phase-badge" class="phase-badge phase-idle">Idle</span>
    <button class="btn btn-seed" onclick="doSeed()" id="btn-seed"><span class="icon">◈</span>Seed</button>
    <button class="btn btn-sleep" onclick="doSleep()" id="btn-sleep" disabled><span class="icon">☾</span>Sleep</button>
    <button class="btn btn-think" onclick="doThink()" id="btn-think" disabled><span class="icon">⚡</span>Think</button>
    <button class="btn btn-age" onclick="doAge()" id="btn-age" disabled><span class="icon">⌛</span>Age</button>
    <button class="btn" onclick="doReset()"><span class="icon">↻</span>Reset</button>
  </div>
  <div class="main">
    <div class="panel panel-left">
      <div class="panel-header"><span class="dot"></span>Conversation</div>
      <div class="panel-body" id="conv-panel"><div style="color:var(--text-faint);font-size:12px;text-align:center;padding:40px 16px">Click <b style="color:var(--accent2)">Seed</b> to start</div></div>
    </div>
    <div class="panel panel-center" style="position:relative">
      <div class="panel-header">
        <span class="dot" style="background:#ce93d8;box-shadow:0 0 8px #ce93d8"></span>Memory Graph
        <span style="flex:1"></span>
        <span id="graph-info" style="font-size:10px;color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">0 nodes · 0 edges</span>
      </div>
      <div style="flex:1;position:relative;overflow:hidden">
        <svg id="graph-svg"></svg>
        <div class="graph-overlay">
          <div class="graph-stat" id="stat-ep">Episodes: <b>0</b></div>
          <div class="graph-stat" id="stat-ent">Entities: <b>0</b></div>
          <div class="graph-stat" id="stat-cross">Cross-links: <b>0</b></div>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="legend-swatch node" style="background:var(--episode)"></span>Episode</div>
          <div class="legend-item"><span class="legend-swatch node" style="background:var(--entity)"></span>Entity</div>
          <div class="legend-item"><span class="legend-swatch" style="background:var(--concept-link);opacity:.5"></span>concept_link</div>
          <div class="legend-item"><span class="legend-swatch" style="background:var(--same-theme);opacity:.6"></span>same_theme</div>
          <div class="legend-item"><span class="legend-swatch" style="background:var(--analogous);opacity:.75"></span>analogous_to</div>
        </div>
      </div>
    </div>
    <div class="panel panel-right">
      <div class="panel-header"><span class="dot" style="background:var(--success);box-shadow:0 0 8px var(--success)"></span>Inspector</div>
      <div class="panel-body" id="insp-panel"><div style="color:var(--text-faint);font-size:12px;text-align:center;padding:40px 16px">Memory details appear here</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const EC={concept_link:'#4fc3f7',same_theme:'#81c784',analogous_to:'#ce93d8',episode_similarity:'#4fc3f7',co_activated:'#ffd740',mentions:'#7a8499'};
const EO={concept_link:.35,same_theme:.6,analogous_to:.75,episode_similarity:.4,co_activated:.5,mentions:.3};
const NC={episode:'#4fc3f7',entity:'#81c784'};
let svg,g,sim,linkSel,nodeSel,labelSel,w=0,h=0;
let curGraph={nodes:[],edges:[]};
let activePaths=[];

function initSVG(){
  const container=d3.select('#graph-svg').node().parentElement;
  w=container.clientWidth;h=container.clientHeight;
  svg=d3.select('#graph-svg').attr('width',w).attr('height',h);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');
  // Glow filter
  const f=defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  f.append('feGaussianBlur').attr('stdDeviation','4').attr('result','blur');
  const merge=f.append('feMerge');merge.append('feMergeNode').attr('in','blur');merge.append('feMergeNode').attr('in','SourceGraphic');
  g=svg.append('g');
  // Zoom
  const zoom=d3.zoom().scaleExtent([.5,3]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);
  linkSel=g.append('g').attr('class','links').selectAll('line');
  nodeSel=g.append('g').attr('class','nodes').selectAll('circle');
  labelSel=g.append('g').attr('class','labels').selectAll('text');
}

function updateGraph(graphData,opts={}){
  curGraph=graphData;
  const nodes=graphData.nodes.map(d=>({...d}));
  const edges=graphData.edges.map(d=>({...d}));
  // Preserve positions
  if(sim){
    sim.nodes().forEach(n=>{
      const found=nodes.find(x=>x.id===n.id);
      if(found&&!found.x){found.x=n.x;found.y=n.y;found.vx=n.vx;found.vy=n.vy}
    });
  }
  // Links
  linkSel=g.select('.links').selectAll('line').data(edges,d=>`${d.source}-${d.target}-${d.type}`);
  linkSel.exit().transition().duration(300).style('opacity',0).remove();
  const linkEnter=linkSel.enter().append('line')
    .attr('stroke',d=>EC[d.type]||'#666')
    .attr('stroke-opacity',0)
    .attr('stroke-width',d=>Math.max(1,d.weight*4))
    .attr('stroke-dasharray',d=>d.type==='analogous_to'?'5,3':(d.type==='same_theme'?'none':'none'));
  linkSel=linkEnter.merge(linkSel);
  linkSel.transition().duration(500).attr('stroke-opacity',d=>EO[d.type]||.4);
  // Nodes
  nodeSel=g.select('.nodes').selectAll('circle').data(nodes,d=>d.id);
  nodeSel.exit().transition().duration(300).attr('r',0).remove();
  const nodeEnter=nodeSel.enter().append('circle')
    .attr('r',0).attr('fill',d=>NC[d.type]||'#666')
    .attr('class',d=>'node-circle '+d.type)
    .attr('filter','url(#glow)')
    .call(d3.drag().on('start',dragStart).on('drag',dragging).on('end',dragEnd));
  nodeSel=nodeEnter.merge(nodeSel);
  nodeSel.transition().duration(500).attr('r',d=>d.type==='episode'?16:9);
  // Labels
  labelSel=g.select('.labels').selectAll('text').data(nodes,d=>d.id);
  labelSel.exit().remove();
  const labelEnter=labelSel.enter().append('text').attr('class','node-label').attr('dy',d=>d.type==='episode'?28:22);
  labelSel=labelEnter.merge(labelSel);
  labelSel.text(d=>d.type==='episode'?d.id:d.id);
  // Simulation
  if(sim)sim.stop();
  sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id).distance(d=>d.type==='concept_link'?60:120).strength(d=>d.weight*.3))
    .force('charge',d3.forceManyBody().strength(d=>d.type==='episode'?-400:-200))
    .force('center',d3.forceCenter(w/2,h/2))
    .force('collision',d3.forceCollide().radius(d=>d.type==='episode'?24:16))
    .on('tick',()=>{
      linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeSel.attr('cx',d=>d.x).attr('cy',d=>d.y);
      labelSel.attr('x',d=>d.x).attr('y',d=>d.y);
    });
  // Stats
  const epCount=nodes.filter(n=>n.type==='episode').length;
  const entCount=nodes.filter(n=>n.type==='entity').length;
  const crossCount=edges.filter(e=>typeof e.source==='string'&&e.source.startsWith('ep-')&&typeof e.target==='string'&&e.target.startsWith('ep-')&&e.type!=='concept_link').length;
  d3.select('#stat-ep b').text(epCount);
  d3.select('#stat-ent b').text(entCount);
  d3.select('#stat-cross b').text(crossCount);
  d3.select('#graph-info').text(`${nodes.length} nodes · ${edges.length} edges`);
}

function dragStart(e,d){if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}
function dragging(e,d){d.fx=e.x;d.fy=e.y}
function dragEnd(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}

function highlightActivation(activations){
  // Clear previous
  nodeSel.classed('activated',false);
  linkSel.classed('highlighted',false).attr('stroke-opacity',d=>EO[d.type]||.4);
  // Animate by hop
  const byHop={};
  activations.forEach(a=>{
    if(!byHop[a.hop])byHop[a.hop]=[];
    byHop[a.hop].push(a);
  });
  const hops=Object.keys(byHop).sort((a,b)=>a-b);
  hops.forEach((hop,i)=>{
    setTimeout(()=>{
      byHop[hop].forEach(a=>{
        nodeSel.filter(d=>d.id===a.node_id).classed('activated',true)
          .transition().duration(400).attr('r',d=>d.type==='episode'?22:14)
          .transition().duration(400).attr('r',d=>d.type==='episode'?16:9);
        // Highlight path edges
        if(a.path_edges){
          a.path_edges.forEach(pe=>{
            linkSel.filter(d=>{
              const s=d.source.id||d.source,t=d.target.id||d.target;
              return(s===pe.source&&t===a.path[a.path.indexOf(pe.source)+1])||(t===pe.source&&s===a.path[a.path.indexOf(pe.source)+1]);
            }).classed('highlighted',true).attr('stroke-opacity',1).attr('stroke-width',5);
          });
        }
        // Pulse ring
        const node=nodeSel.filter(d=>d.id===a.node_id);
        const pulseG=g.append('circle')
          .attr('cx',node.attr('cx')).attr('cy',node.attr('cy'))
          .attr('r',d=>nodeSel.filter(d=>d.id===a.node_id).attr('r'))
          .attr('fill','none').attr('stroke','#ffd740').attr('stroke-width',2).attr('opacity',.8)
          .transition().duration(1200).attr('r',50).attr('opacity',0).remove();
      });
    },i*800);
  });
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  setTimeout(()=>t.className='toast '+type,3000);
}
function setPhase(p){
  const b=document.getElementById('phase-badge');
  b.className='phase-badge phase-'+p;
  b.textContent=p.charAt(0).toUpperCase()+p.slice(1);
}
function setButtons(phase){
  const btns=['seed','sleep','think','age'];
  const enable={idle:[],seeded:['sleep'],consolidated:['think'],queried:['age'],aged:[]};
  btns.forEach(b=>{document.getElementById('btn-'+b).disabled=!enable[phase]?.includes(b)});
  if(phase==='idle'||phase==='aged')document.getElementById('btn-seed').disabled=false;
}
function renderConversation(log){
  const panel=document.getElementById('conv-panel');
  if(!log||!log.length){panel.innerHTML='<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:40px 16px">Click <b style="color:var(--accent2)">Seed</b> to start</div>';return}
  panel.innerHTML=log.map(m=>{
    let cls='msg msg-'+(m.role||'system');
    if(m.phase==='sleep')cls='msg msg-system msg-sleep';
    else if(m.phase==='activation')cls='msg msg-system msg-activation';
    else if(m.phase==='age')cls='msg msg-system msg-age';
    else if(m.role==='user')cls='msg msg-user';
    else cls='msg msg-system';
    return `<div class="${cls}">${escapeHtml(m.content)}</div>`;
  }).join('');
  panel.scrollTop=panel.scrollHeight;
}
function renderInspector(graphData,extra={}){
  const panel=document.getElementById('insp-panel');
  let html='';
  // Finding banner
  if(extra.finding){
    const f=extra.finding;
    html+=`<div class="finding-banner">
      <div class="ftitle">★ Hidden Association Found</div>
      <div class="fpath">${f.path.join(' → ')}</div>
      <div class="fdesc">Score: ${f.score.toFixed(4)} · Hop ${f.hop} · via analogous_to (created during sleep)</div>
    </div>`;
    html+=`<div class="compare-box">
      <div class="compare-col chatgpt"><h5>ChatGPT</h5>Keyword match only. "embedding" and "interpretability" have 0 overlap. Not found.</div>
      <div class="compare-col dt"><h5>DocThinker</h5>Association graph. Found via 2-hop path in ${f.score.toFixed(4)}s.</div>
    </div>`;
  }
  // Aging results
  if(extra.episodeStatus){
    html+=`<div class="inspector-section"><h4>Aging Results</h4>`;
    extra.episodeStatus.forEach(ep=>{
      const barW=Math.round(ep.avg_weight*100);
      const barColor=ep.status==='STRONG'?'#00e676':(ep.status==='WEAKENED'?'#ff4081':'#ffd740');
      html+=`<div class="ep-status ${ep.status}">
        <span style="font-weight:600">${ep.episode_id}</span>
        <span class="weight-bar"><span class="weight-bar-fill" style="width:${barW}%;background:${barColor}"></span></span>
        <span>${ep.avg_weight.toFixed(2)}</span>
        <span style="margin-left:auto;font-size:10px;color:var(--text-dim)">${ep.pruned_edges} pruned</span>
      </div>`;
    });
    html+=`</div>`;
  }
  // Nodes
  if(graphData.nodes.length){
    html+=`<div class="inspector-section"><h4>Nodes (${graphData.nodes.length})</h4>`;
    graphData.nodes.forEach(n=>{
      html+=`<div class="node-card">
        <span class="nid">${n.id}</span><span class="ntype ${n.type}">${n.type}</span>`;
      if(n.summary)html+=`<div class="nsum">${n.summary.substring(0,50)}...</div>`;
      if(n.concepts)html+=`<div class="nsum" style="margin-top:2px"><span style="color:var(--text-faint)">concepts:</span> ${n.concepts.join(', ')}</div>`;
      if(n.retrieval_count!==undefined&&n.retrieval_count>0)html+=`<div class="nsum" style="color:var(--warning)">recalled ${n.retrieval_count}×</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  }
  // Edges by type
  if(graphData.edges.length){
    const byType={};
    graphData.edges.forEach(e=>{if(!byType[e.type])byType[e.type]=[];byType[e.type].push(e)});
    html+=`<div class="inspector-section"><h4>Edges (${graphData.edges.length})</h4>`;
    Object.entries(byType).forEach(([type,elist])=>{
      const avgW=elist.reduce((s,e)=>s+e.weight,0)/elist.length;
      html+=`<div class="node-card" style="font-size:11px">
        <span style="color:${EC[type]||'#666'};font-weight:600">■</span>
        <span class="nid" style="font-size:11px">${type}</span>
        <span style="color:var(--text-dim);font-size:10px">(${elist.length}, avg ${avgW.toFixed(2)})</span>
      </div>`;
    });
    html+=`</div>`;
  }
  if(!html)html='<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:40px 16px">Memory details appear here</div>';
  panel.innerHTML=html;
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function api(url,data){
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data||{})});
  return r.json();
}

async function doSeed(){
  showToast('Seeding memories...','');
  const r=await api('/api/seed');
  if(r.error){showToast(r.error,'error');return}
  setPhase('seeded');setButtons('seeded');
  updateGraph(r.graph);
  renderConversation(r.conversation);
  renderInspector(r.graph);
  showToast('3 episodes seeded','success');
}
async function doSleep(){
  showToast('Sleep consolidation running...','warning');
  document.getElementById('btn-sleep').disabled=true;
  const r=await api('/api/sleep');
  if(r.error){showToast(r.error,'error');return}
  setPhase('consolidated');setButtons('consolidated');
  updateGraph(r.graph);
  renderConversation(r.conversation);
  renderInspector(r.graph);
  showToast(`Sleep done! +${r.stats.edges_added} cross-links created`,'success');
}
async function doThink(){
  showToast('Spreading activation...','warning');
  document.getElementById('btn-think').disabled=true;
  const r=await api('/api/query',{query:'embedding drift',seed:'embedding'});
  if(r.error){showToast(r.error,'error');return}
  setPhase('queried');setButtons('queried');
  updateGraph(r.graph);
  renderConversation(r.conversation);
  renderInspector(r.graph,{finding:r.hidden_finding});
  if(r.activations)highlightActivation(r.activations);
  showToast(`Activated ${r.activations.length} nodes`,'success');
}
async function doAge(){
  showToast('Simulating 30-day aging...','warning');
  document.getElementById('btn-age').disabled=true;
  const r=await api('/api/age');
  if(r.error){showToast(r.error,'error');return}
  setPhase('aged');setButtons('aged');
  updateGraph(r.graph);
  renderConversation(r.conversation);
  renderInspector(r.graph,{episodeStatus:r.episode_status});
  showToast(`Aged! ${r.stats.total_pruned} edges pruned`,'success');
}
async function doReset(){
  await api('/api/reset');
  setPhase('idle');setButtons('idle');
  curGraph={nodes:[],edges:[]};
  updateGraph(curGraph);
  renderConversation([]);renderInspector(curGraph);
  showToast('Memory reset','');
}

window.addEventListener('load',()=>{initSVG();setButtons('idle')});
window.addEventListener('resize',()=>{
  const container=d3.select('#graph-svg').node().parentElement;
  w=container.clientWidth;h=container.clientHeight;
  d3.select('#graph-svg').attr('width',w).attr('height',h);
  if(sim)sim.force('center',d3.forceCenter(w/2,h/2)).alpha(.3).restart();
});
</script>
