name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Force Node.js 24 on runner to avoid the deprecation warning for
# actions/checkout@v4 and actions/setup-python@v5 (Node.js 20 support
# ends 2026-09-16, default switch 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[all]"
          pip install pytest pytest-asyncio
      - name: Run tests
        # Removed `|| true` so test failures actually fail CI. Pytest's
        # exit code now propagates to the workflow.
        run: pytest tests/ -v --ignore=tests/debug_db.py
